default_required_actions:
  - 请保留原始来源记录以供核查。

public_use:
  requires_disclosure: true
  disclosure_text: 请披露该总结由 AI 生成，并经 MANDATE 审计。

quantifier_thresholds:
  supermajority: 0.75
  partial_min_count: 2

omission_thresholds:
  numerical_minority_ratio: 0.2
  weak_similarity: 0.18
  covered_similarity: 0.32
  near_one_cluster_per_opinion_ratio: 0.75
  minimum_cluster_size: 1
  merge_similarity_threshold: 0.72
  maximum_recommended_clusters: 10

normative_salience_terms:
  - 权利
  - 歧视
  - 隐私
  - 无法申诉
  - 不能申诉
  - 不可逆
  - 弱势群体
  - 少数群体
  - 被排除
  - 未成年人
  - 严重误判
  - 强烈反对
  - 坚决反对
  - 申诉
  - 退出
  - 复核
  - 纠错
  - 删除

authorization_rules:
  - rule_id: AUTHORIZATION_MISSING
    description: 缺少必要的授权信息。
    condition: missing_authority_basis
    status: UNKNOWN
    required_action: 请补充明确的授权说明信息。
    required_disclosure: 授权依据尚未经过核实。
    severity: high
  - rule_id: PURPOSE_OUT_OF_SCOPE
    description: 实际用途超出授权范围。
    condition: purpose_out_of_scope
    status: REAUTHORIZE
    required_action: 请就实际用途重新取得授权。
    required_disclosure: 当前使用目的超出原始授权范围。
    severity: high
  - rule_id: AUDIENCE_OUT_OF_SCOPE
    description: 实际受众超出授权范围。
    condition: audience_out_of_scope
    status: REAUTHORIZE
    required_action: 请就实际受众重新取得授权。
    required_disclosure: 当前受众范围超出原始授权。
    severity: high
  - rule_id: PUBLICATION_NOT_ALLOWED
    description: 未授权公开发布。
    condition: publication_not_allowed
    status: PROHIBITED
    required_action: 获得新授权前，请停止公开发布。
    required_disclosure: 公开发布未经授权。
    severity: critical
  - rule_id: AI_PROCESSING_NOT_ALLOWED
    description: 未授权 AI 处理。
    condition: ai_processing_not_allowed
    status: PROHIBITED
    required_action: 请停止 AI 处理，或取得明确知情同意。
    required_disclosure: AI 处理未经授权。
    severity: critical
  - rule_id: INFERENCE_NOT_ALLOWED
    description: 未授权推断超出原文范围。
    condition: inference_not_allowed
    status: REAUTHORIZE
    required_action: 请删除推断性内容，或重新取得授权。
    required_disclosure: 超出原文范围的推断未经授权。
    severity: high
  - rule_id: IDENTITY_DISCLOSURE_NOT_ALLOWED
    description: 未授权身份披露。
    condition: identity_disclosure_not_allowed
    status: PROHIBITED
    required_action: 请删除身份信息，或取得明确的披露同意。
    required_disclosure: 身份披露未经授权。
    severity: critical
  - rule_id: REUSE_NOT_ALLOWED
    description: 未授权后续复用。
    condition: reuse_not_allowed
    status: REAUTHORIZE
    required_action: 未经授权，请勿在本次审计范围外复用该材料。
    required_disclosure: 后续复用未经授权。
    severity: high
  - rule_id: MODEL_TRAINING_NOT_ALLOWED
    description: 未授权用于模型训练。
    condition: model_training_not_allowed
    status: PROHIBITED
    required_action: 请勿将此材料用于 AI 模型训练。
    required_disclosure: 模型训练使用未经授权。
    severity: critical
  - rule_id: REQUIRED_DISCLOSURE_MISSING
    description: 使用前须附必要的披露声明。
    condition: required_disclosure_missing
    status: CONDITIONAL
    required_action: 使用前请补充必要的披露声明。
    required_disclosure: 本总结由 AI 辅助生成，为探索性样本，不代表全体参与者立场。
    severity: medium
  - rule_id: WITHDRAWAL_MECHANISM_MISSING
    description: 撤回机制缺失或不明确。
    condition: withdrawal_mechanism_missing
    status: CONDITIONAL
    required_action: 请提供撤回方式，或说明不支持撤回的原因。
    required_disclosure: 参与者撤回流程须向受众披露。
    severity: medium
  - rule_id: UNIVERSAL_REPRESENTATION_NOT_AUTHORIZED
    description: 授权范围不允许以全体群体名义发言。
    condition: universal_representation_not_authorized
    status: REAUTHORIZE
    required_action: 请删除"代表全体"的表述，或取得被代言群体的明确授权。
    required_disclosure: 当前样本不授权对全体学生作出概括性主张。
    severity: high
